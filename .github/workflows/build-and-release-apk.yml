name: Build And Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Prepare release asset
        id: prepare_asset
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          APK_NAME="kinetic-wol-main-${SHORT_SHA}.apk"
          cp "${APK_PATH}" "${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare_asset.outputs.apk_name }}
          path: ${{ steps.prepare_asset.outputs.apk_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.sha }}
          name: Main build ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.prepare_asset.outputs.apk_name }}
