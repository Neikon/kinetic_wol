name: Build And Release APK

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Configure Android SDK paths
        run: |
          echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
          echo "${ANDROID_HOME}/platform-tools" >> "${GITHUB_PATH}"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1

      - name: Install Android SDK packages
        run: sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Prepare release asset
        id: prepare_asset
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          APK_NAME="kinetic-wol-main-${SHORT_SHA}.apk"
          cp "${APK_PATH}" "${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.prepare_asset.outputs.apk_name }}
          path: ${{ steps.prepare_asset.outputs.apk_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: main-${{ github.sha }}
          name: Main build ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.prepare_asset.outputs.apk_name }}
